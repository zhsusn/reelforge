<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<title>角色工厂 - 织影 ShadowWeave</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
        body { background-color: #0a0a0f; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(26, 26, 35, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .sidebar-item.active { background: rgba(0, 212, 255, 0.1); border-left: 4px solid #00d4ff; color: #00d4ff; }
        .text-gradient { background: linear-gradient(90deg, #00d4ff, #b829dd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .avatar-glow { box-shadow: 0 0 20px rgba(0, 212, 255, 0.2); }
    </style>
</head>
<body class="flex min-h-screen">
<aside class="w-64 glass border-r border-white/5 flex flex-col fixed h-full z-50">
<div class="p-6 flex items-center gap-3">
<div class="w-10 h-10 bg-gradient-to-br from-[#00d4ff] to-[#b829dd] rounded-lg flex items-center justify-center">
<span class="iconify text-2xl" data-icon="solar:magic-stick-3-bold-duotone"></span>
</div>
<h1 class="text-xl font-bold tracking-wider text-gradient">织影 Weave</h1>
</div>
<nav class="flex-1 px-4 py-4 space-y-2">
<a class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition-all text-slate-400" href="index.html">
<span class="iconify text-xl" data-icon="solar:widget-5-bold-duotone"></span>
<span>核心控制台</span>
</a>
<a class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 text-slate-400" href="scripts.html">
<span class="iconify text-xl" data-icon="solar:document-text-bold-duotone"></span>
<span>剧本工坊</span>
</a>
<a class="sidebar-item active flex items-center gap-3 px-4 py-3 rounded-xl transition-all" href="characters.html">
<span class="iconify text-xl" data-icon="solar:users-group-rounded-bold-duotone"></span>
<span>角色工厂</span>
</a>
<a class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition-all text-slate-400" href="editor.html">
<span class="iconify text-xl" data-icon="solar:clapperboard-edit-bold-duotone"></span>
<span>分镜工作室</span>
</a>
<a class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition-all text-slate-400" href="render.html">
<span class="iconify text-xl" data-icon="solar:cloud-upload-bold-duotone"></span>
<span>渲染中心</span>
</a>
<a class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition-all text-slate-400" href="library.html">
<span class="iconify text-xl" data-icon="solar:gallery-wide-bold-duotone"></span>
<span>成片库</span>
</a>
</nav>
</aside>
<main class="flex-1 ml-64 p-8">
<div class="flex justify-between items-end mb-10">
<div>
<h2 class="text-3xl font-bold mb-2">角色工厂</h2>
<p class="text-slate-400">AI 角色一致性管理，支持 Anime &amp; Realistic 风格</p>
</div>
<div class="flex gap-4 text-white">
<button class="px-6 py-3 glass rounded-xl font-bold flex items-center gap-2 hover:bg-white/10 transition-all border-white/10">
<span class="iconify" data-icon="solar:test-tube-bold"></span>
                    进行音色测试
                </button>
<button class="px-6 py-3 bg-gradient-to-r from-[#b829dd] to-[#7a1ba3] rounded-xl font-bold flex items-center gap-2 shadow-lg shadow-purple-500/20">
<span class="iconify" data-icon="solar:user-plus-bold"></span>
                    创建新角色
                </button>
</div>
</div>
<div class="grid grid-cols-4 gap-6">
<!-- 角色卡片 -->
<div class="glass rounded-[2rem] overflow-hidden group hover:border-[#00d4ff]/50 transition-all text-white">
<div class="relative h-64 bg-slate-800">
<img alt="Anime Girl" class="w-full h-full object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-03-01/2159b1e7b5a84c37ad3e1f776284e434.jpg"/>
<div class="absolute inset-0 bg-gradient-to-t from-[#0a0a0f] to-transparent"></div>
<div class="absolute bottom-4 left-4 right-4 flex justify-between items-end">
<span class="bg-green-500/20 text-green-400 text-[10px] px-2 py-0.5 rounded border border-green-500/30 backdrop-blur-md">一致性 98%</span>
<div class="flex gap-1">
<span class="w-2 h-2 rounded-full bg-[#00d4ff]"></span>
<span class="w-2 h-2 rounded-full bg-slate-600"></span>
</div>
</div>
</div>
<div class="p-6">
<h4 class="text-xl font-bold mb-1 px-4">星野 凛 (Rin)</h4>
<p class="text-xs text-slate-500 mb-4 px-4">日系赛博风格 · 少女 · 活泼</p>
<div class="flex gap-2 px-4">
<button class="flex-1 py-3 bg-white/5 rounded-xl text-xs hover:bg-white/10 border border-white/5">首帧图锁定</button>
<button class="p-3 bg-white/5 rounded-xl text-xs hover:bg-white/10 border border-white/5">
<span class="iconify text-lg" data-icon="solar:pen-new-square-bold"></span>
</button>
</div>
</div>
</div>
<!-- 卡片 2 -->
<div class="glass rounded-[2rem] overflow-hidden group hover:border-[#00d4ff]/50 transition-all text-white">
<div class="relative h-64 bg-slate-800">
<img alt="Man" class="w-full h-full object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-03-01/8099219f0be443f9a10ea032c2e5d4d9.jpg"/>
<div class="absolute inset-0 bg-gradient-to-t from-[#0a0a0f] to-transparent"></div>
<div class="absolute bottom-4 left-4 right-4 flex justify-between items-end">
<span class="bg-[#00d4ff]/20 text-[#00d4ff] text-[10px] px-2 py-0.5 rounded border border-[#00d4ff]/30 backdrop-blur-md">一致性 92%</span>
<div class="flex gap-1">
<span class="w-2 h-2 rounded-full bg-[#00d4ff]"></span>
<span class="w-2 h-2 rounded-full bg-[#00d4ff]"></span>
</div>
</div>
</div>
<div class="p-6">
<h4 class="text-xl font-bold mb-1 px-4">凯恩 (Kane)</h4>
<p class="text-xs text-slate-500 mb-4 px-4">写实风格 · 成年男性 · 深沉</p>
<div class="flex gap-2 px-4">
<button class="flex-1 py-3 bg-white/5 rounded-xl text-xs hover:bg-white/10 border border-white/5">首帧图锁定</button>
<button class="p-3 bg-white/5 rounded-xl text-xs hover:bg-white/10 border border-white/5">
<span class="iconify text-lg" data-icon="solar:pen-new-square-bold"></span>
</button>
</div>
</div>
</div>
<!-- 角色卡片模版 placeholder -->
<div class="border-2 border-dashed border-white/10 rounded-[2rem] flex flex-col items-center justify-center p-8 text-slate-500 hover:border-[#00d4ff]/30 cursor-pointer transition-all">
<div class="w-16 h-16 rounded-full bg-white/5 flex items-center justify-center mb-4">
<span class="iconify text-3xl" data-icon="solar:add-circle-bold"></span>
</div>
<p class="text-sm font-bold">训练新角色模型</p>
<p class="text-[10px] mt-1 italic text-white">消耗 500 积分</p>
</div>
</div>
</main>

</html>
