<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<title>分镜工作室 - 织影 ShadowWeave</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
        body { background-color: #0a0a0f; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(26, 26, 35, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .sidebar-item-mini.active { color: #00d4ff; background: rgba(0, 212, 255, 0.1); }
        .timeline-item.active { border: 2px solid #00d4ff; box-shadow: 0 0 15px rgba(0, 212, 255, 0.2); }
        .text-gradient { background: linear-gradient(90deg, #00d4ff, #b829dd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="flex h-screen">
<!-- 极简左侧栏 -->
<aside class="w-16 glass border-r border-white/5 flex flex-col items-center py-6 gap-6 z-50">
<a class="w-10 h-10 bg-gradient-to-br from-[#00d4ff] to-[#b829dd] rounded-lg flex items-center justify-center" href="index.html">
<span class="iconify text-xl" data-icon="solar:home-2-bold"></span>
</a>
<div class="flex-1 flex flex-col gap-4">
<button class="w-10 h-10 rounded-xl flex items-center justify-center hover:bg-white/5 text-slate-500"><span class="iconify text-2xl" data-icon="solar:gallery-bold"></span></button>
<button class="w-10 h-10 rounded-xl flex items-center justify-center hover:bg-white/5 text-[#00d4ff] bg-blue-500/10"><span class="iconify text-2xl" data-icon="solar:clapperboard-edit-bold"></span></button>
<button class="w-10 h-10 rounded-xl flex items-center justify-center hover:bg-white/5 text-slate-500"><span class="iconify text-2xl" data-icon="solar:music-note-bold"></span></button>
<button class="w-10 h-10 rounded-xl flex items-center justify-center hover:bg-white/5 text-slate-500"><span class="iconify text-2xl" data-icon="solar:magic-stick-bold"></span></button>
</div>
<button class="w-10 h-10 rounded-xl flex items-center justify-center hover:bg-white/5 text-slate-500"><span class="iconify text-2xl" data-icon="solar:settings-bold"></span></button>
</aside>
<!-- 主编辑器三栏 -->
<!-- 1. 资源/分镜列表 -->
<section class="w-80 glass border-r border-white/5 flex flex-col">
<div class="p-6 border-b border-white/5">
<h3 class="font-bold flex items-center gap-2">
<span class="iconify text-[#00d4ff]" data-icon="solar:layers-bold-duotone"></span>
                剧本分镜 (12)
            </h3>
</div>
<div class="flex-1 overflow-y-auto p-4 space-y-4">
<div class="timeline-item active glass p-3 rounded-2xl cursor-pointer">
<div class="relative rounded-lg overflow-hidden h-24 mb-2">
<img alt="Scene" class="w-full h-full object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-03-01/a3cc38f7d6a1427d9d75f59ad3deb2df.jpg"/>
<span class="absolute top-2 left-2 bg-black/60 px-2 py-0.5 rounded text-[10px]">SCENE 01</span>
</div>
<p class="text-xs text-slate-300 line-clamp-2">特写：凛在雨夜的街头行走，霓虹灯倒映在水中...</p>
</div>
<div class="timeline-item glass p-3 rounded-2xl cursor-pointer hover:border-white/20 transition-all opacity-60">
<div class="relative rounded-lg overflow-hidden h-16 mb-2">
<img alt="Scene" class="w-full h-full object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-03-01/a3cc38f7d6a1427d9d75f59ad3deb2df.jpg"/>
<span class="absolute top-2 left-2 bg-black/60 px-2 py-0.5 rounded text-[10px]">SCENE 02</span>
</div>
<p class="text-[10px] text-slate-500 line-clamp-1">中景：远处的摩天大楼...</p>
</div>
<!-- 重复 -->
<div class="timeline-item glass p-3 rounded-2xl cursor-pointer hover:border-white/20 transition-all opacity-60">
<div class="relative rounded-lg overflow-hidden h-16 mb-2">
<img alt="Scene" class="w-full h-full object-cover text-white" src="https://modao.cc/agent-py/media/generated_images/2026-03-01/a3cc38f7d6a1427d9d75f59ad3deb2df.jpg"/>
<span class="absolute top-2 left-2 bg-black/60 px-2 py-0.5 rounded text-[10px]">SCENE 03</span>
</div>
<p class="text-[10px] text-slate-500 line-clamp-1">全景：整个城市的俯视...</p>
</div>
</div>
</section>
<!-- 2. 中央预览区 -->
<section class="flex-1 flex flex-col bg-[#050508]">
<div class="flex-1 p-10 flex flex-col items-center justify-center">
<div class="w-full max-w-4xl aspect-video glass rounded-3xl overflow-hidden relative group">
<img alt="Preview" class="w-full h-full object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-03-01/a3f835a1f58640b4a821c99be09d1767.jpg"/>
<div class="absolute inset-0 flex items-center justify-center bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity">
<button class="w-16 h-16 bg-[#00d4ff] rounded-full flex items-center justify-center shadow-lg shadow-blue-500/40">
<span class="iconify text-3xl text-white" data-icon="solar:play-bold"></span>
</button>
</div>
<div class="absolute bottom-6 left-6 right-6 flex items-center gap-4 text-xs font-mono">
<span class="bg-black/80 px-3 py-1 rounded">00:12:04 / 00:45:00</span>
<div class="flex-1 h-1 bg-white/10 rounded-full overflow-hidden">
<div class="h-full w-1/4 bg-[#00d4ff]"></div>
</div>
</div>
</div>
</div>
<!-- 底部控制 -->
<div class="h-20 glass border-t border-white/5 flex items-center justify-between px-8">
<div class="flex gap-4">
<button class="p-2 hover:bg-white/5 rounded-lg text-slate-400"><span class="iconify text-xl" data-icon="solar:skip-previous-bold"></span></button>
<button class="p-2 bg-white/10 rounded-lg text-white"><span class="iconify text-xl" data-icon="solar:pause-bold"></span></button>
<button class="p-2 hover:bg-white/5 rounded-lg text-slate-400"><span class="iconify text-xl" data-icon="solar:skip-next-bold"></span></button>
</div>
<div class="flex gap-2">
<button class="px-4 py-2 glass rounded-lg text-xs font-bold border-white/10">快照预览</button>
<button class="px-4 py-2 bg-gradient-to-r from-[#00d4ff] to-[#b829dd] rounded-lg text-xs font-bold shadow-lg">开始渲染成片</button>
</div>
</div>
</section>
<!-- 3. 设置面板 -->
<section class="w-80 glass border-l border-white/5 p-6 space-y-8 overflow-y-auto">
<h4 class="font-bold flex items-center gap-2">
<span class="iconify text-[#b829dd]" data-icon="solar:settings-minimalistic-bold-duotone"></span>
            分镜参数设置
        </h4>
<div class="space-y-4 text-white">
<label class="text-xs text-slate-400 block mb-2">Prompt 画面描述</label>
<textarea class="w-full h-32 glass bg-white/5 rounded-xl p-4 text-xs border-white/10 focus:border-[#00d4ff] outline-none transition-all">An anime-style girl walking in the rain, neon city lights reflecting on the ground, high-quality, cinematic lighting, purple and teal mood.</textarea>
</div>
<div class="space-y-6">
<div>
<div class="flex justify-between items-center mb-3">
<label class="text-xs text-slate-400">智能运镜 (Camera Motion)</label>
<span class="text-[10px] text-[#00d4ff]">推镜头 (Zoom In)</span>
</div>
<div class="grid grid-cols-4 gap-2">
<button class="glass p-2 rounded-lg border-[#00d4ff] text-[#00d4ff]"><span class="iconify text-xl m-auto" data-icon="solar:arrow-up-circle-bold"></span></button>
<button class="glass p-2 rounded-lg opacity-40 hover:opacity-100 transition-all"><span class="iconify text-xl m-auto" data-icon="solar:arrow-down-circle-bold"></span></button>
<button class="glass p-2 rounded-lg opacity-40 hover:opacity-100 transition-all"><span class="iconify text-xl m-auto" data-icon="solar:refresh-square-bold"></span></button>
<button class="glass p-2 rounded-lg opacity-40 hover:opacity-100 transition-all"><span class="iconify text-xl m-auto" data-icon="solar:maximize-square-bold"></span></button>
</div>
</div>
<div>
<label class="text-xs text-slate-400 block mb-3">视频时长 (秒)</label>
<input class="w-full accent-[#00d4ff]" max="10" min="1" type="range" value="4"/>
<div class="flex justify-between text-[10px] text-slate-500 mt-1"><span>1s</span><span>10s</span></div>
</div>
<div class="pt-4 border-t border-white/5">
<button class="w-full py-4 glass rounded-2xl text-sm font-bold border-[#00d4ff]/20 hover:bg-[#00d4ff]/5 transition-all text-[#00d4ff]">
                    重新生成预览帧 (耗费 5 积分)
                </button>
</div>
</div>
</section>
</body>
</html>
