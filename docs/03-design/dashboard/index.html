<script>
        // 初始化 ECharts
        const chart = echarts.init(document.getElementById('trendChart'), 'dark');
        const option = {
            backgroundColor: 'transparent',
            tooltip: { trigger: 'axis' },
            legend: { data: ['DeepSeek Token', '渲染任务'], bottom: 0, textStyle: { color: '#94a3b8' } },
            grid: { top: 20, left: '3%', right: '4%', bottom: '15%', containLabel: true },
            xAxis: {
                type: 'category',
                boundaryGap: false,
                data: ['02-23', '02-24', '02-25', '02-26', '02-27', '02-28', '03-01'],
                axisLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } }
            },
            yAxis: {
                type: 'value',
                splitLine: { lineStyle: { color: 'rgba(255,255,255,0.05)' } }
            },
            series: [
                {
                    name: 'DeepSeek Token',
                    type: 'line',
                    smooth: true,
                    data: [120, 132, 101, 134, 90, 230, 210],
                    itemStyle: { color: '#00d4ff' },
                    areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{offset: 0, color: 'rgba(0, 212, 255, 0.3)'}, {offset: 1, color: 'transparent'}]) }
                },
                {
                    name: '渲染任务',
                    type: 'line',
                    smooth: true,
                    data: [45, 182, 191, 234, 290, 330, 310],
                    itemStyle: { color: '#b829dd' }
                }
            ]
        };
        chart.setOption(option);
        window.addEventListener('resize', () => chart.resize());
    </script>
